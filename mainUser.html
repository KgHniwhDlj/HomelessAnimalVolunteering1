<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Помощь бездомным животным</title>
</head>
<body>
<section id="Pets">
    <h2>Список животных</h2>
    <div class="pet-container" style="margin: 10px 10px 10px 5px;">
        <button id="create-pet-btn" class="edit-pet" type="button">Зарегестрировать животное</button>
        <button id="move-pet-btn" class="edit-pet" type="button">Переместить в другой вольер</button>
        <button id="edit-pet-btn" class="edit-pet" type="button">Изменить состояние</button>
        <button id="shift-pet-btn" class="edit-pet" type="button">Смена</button>
    </div>
    <table style=" width: 100%; border: 1px solid black;  text-align: left; margin: 10px 10px 10px 5px;">
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Вольер</th>
            <th>Состояние</th>
            <th>Дата добавления</th>
            <th>Добавил(а)</th>
            <th>Дата последнего изменения</th>
            <th>Изменил(а)</th>
        </tr>
    </table>
</section >
<a href="authorization.html">Выйти</a>
</body>
</html>
