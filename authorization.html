    </div>
    <div style="display: flex; justify-content: center;">
      <button id="submit-btn" type="button" style="width: 80px; font-size: 12pt;"> Войти </button>
    </div>
  </section>
</main>
<footer class="adminData">
  Admin Data <br>
  email: admin@example.com <br>
  password: admin123
</footer>
